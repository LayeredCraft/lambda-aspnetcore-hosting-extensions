name: Publish Preview

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - 'uv.lock'

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    uses: LayeredCraft/devops-templates/.github/workflows/publish-preview.yml@v10.2
    with:
      solution: LayeredCraft.Lambda.AspNetCore.HostingExtensions.slnx
      dotnetVersion: |
        8.0.x
        9.0.x
        10.0.x
      hasTests: false
    secrets: inherit

  push:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: LayeredCraft/devops-templates/.github/actions/nuget-push@v10.2
        with:
          nuget_user: ${{ secrets.NUGET_USER }}
