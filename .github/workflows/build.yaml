name: Build
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - beta
      - release/*
    tags:
      - v*
    paths-ignore:
      - docs/**
      - README.md
      - mkdocs.yml
      - pyproject.toml
      - uv.lock
permissions: write-all
jobs:
  build:
    uses: LayeredCraft/devops-templates/.github/workflows/package-build.yaml@v10.2
    with:
      hasTests: true
      dotnet-version: |
        8.0.x
        9.0.x
        10.0.x
    secrets: inherit